name: "Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
  workflow_dispatch: # อนุญาตให้รันเองจากหน้า GitHub Actions ได้

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # โฟลเดอร์ที่ได้จากการ build (vite ใช้ dist)
          branch: gh-pages # branch ปลายทางสำหรับแสดงผลเว็บ
          clean: true
