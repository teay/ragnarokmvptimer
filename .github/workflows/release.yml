name: "Release Build"

on:
  push:
    branches:
      - main
      - feat/tauri-v2-desktop
    # Also trigger when you push a version tag (e.g. v1.0.0)
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel Macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Linux
            args: ""
          - platform: "windows-latest" # for Windows (.exe / .msi)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: install frontend dependencies
        run: npm install

      - name: build frontend and tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action will replace __VERSION__ with the version from package.json
          releaseName: "Ragnarok MVP Timer v__VERSION__"
          releaseBody: "Automated release of Ragnarok MVP Timer."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
