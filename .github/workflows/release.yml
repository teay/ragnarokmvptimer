name: "Release Build"

on:
  push:
    branches:
      - main
      - feat/tauri-v2-desktop
      - feature/sync-local-data
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
          # Commenting out mac/linux to speed up Windows testing for now, 
          # you can uncomment them later when everything is stable.
          # - platform: "macos-latest"
          #   args: "--target aarch64-apple-darwin"
          # - platform: "ubuntu-22.04"
          #   args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend and tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Ragnarok MVP Timer v__VERSION__"
          releaseBody: "Automated release of Ragnarok MVP Timer."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: upload artifacts (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
