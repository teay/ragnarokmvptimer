name: Build Tauri Windows Portable EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install WebView2 Runtime (required for Tauri on Windows)
        # Download and silently install WebView2 Evergreen bootstrapper
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\WebView2Installer.exe"
          Start-Process -FilePath "$env:TEMP\WebView2Installer.exe" -ArgumentList "/silent /install" -Wait
          Remove-Item "$env:TEMP\WebView2Installer.exe"

      - name: Build Tauri app (Windows)
        run: npm run tauri:build # This will run `npm run build` via beforeBuildCommand

      - name: Locate the produced executable
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in src-tauri/target/release"
            exit 1
          }
          Write-Host "Found executable: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tauri-Windows-EXE
          path: ${{ steps.find_exe.outputs.exe_path }}

      # Optional: Create a release only when pushing a tag (e.g., v1.0.0)
      # Uncomment and adjust if you want automated releases on tags.
      # - name: Create Release (on tag push)
      #   if: github.ref_type == 'tag'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ github.ref }}
      #     name: "Release ${{ github.ref_name }}"
      #     draft: false
      #     prerelease: false
      #     files: ${{ steps.find_exe.outputs.exe_path }}
