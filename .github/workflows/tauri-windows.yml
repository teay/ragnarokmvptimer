name: 'Build Tauri Windows EXE'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0-beta.1)'
        required: true
        default: '0.1.0-beta.1'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Beta release with Reset Timer & Position feature'
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Update version in tauri.conf.json
        run: |
          $version = "${{ github.event.inputs.version }}"
          $version = $version -replace '^v', ''
          (Get-Content 'src-tauri/tauri.conf.json') -replace '"version": "[^"]+"', """version"": ""$version""" | Set-Content 'src-tauri/tauri.conf.json'

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Find EXE file
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release -Filter *.exe -Recurse | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in release folder"
            exit 1
          }
          Write-Host "Found: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Ragnarok MVP Timer ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          draft: true
          prerelease: ${{ contains(github.event.inputs.version, 'beta') }}
          files: ${{ steps.find_exe.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
