name: 'Build Tauri Windows EXE'

on:
  workflow_dispatch: # รันเองจากหน้า GitHub Actions

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install WebView2 Runtime
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\WebView2Installer.exe"
          Start-Process -FilePath "$env:TEMP\WebView2Installer.exe" -ArgumentList "/silent /install" -Wait
          Remove-Item "$env:TEMP\WebView2Installer.exe"

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Find EXE file
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found"
            exit 1
          }
          Write-Host "Found: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ragnarok-MVP-Timer-Windows
          path: ${{ steps.find_exe.outputs.exe_path }}
