<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="WebApp to track Ragnarok MVP respawn"
    />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    
    <!-- Dynamic Manifest Path based on environment -->
    <script>
      (function() {
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        // GitHub Pages production: /ragnarokmvptimer/manifest.webmanifest
        // Local dev: /manifest.webmanifest
        const isProd = window.location.hostname !== 'localhost';
        manifestLink.href = isProd ? '/ragnarokmvptimer/manifest.webmanifest' : '/manifest.webmanifest';
        document.head.appendChild(manifestLink);
      })();
    </script>

    <title>Ragnarok MVP Timer</title>
    <style>
      /* กำหนดสีพื้นหลังเริ่มต้นให้เป็นสีมืด เพื่อป้องกันหน้าจอขาวตอนโหลด */
      html, body {
        background-color: #050505;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }
      #root {
        background-color: #050505;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
